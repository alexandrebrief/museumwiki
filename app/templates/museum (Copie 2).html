<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Explorer les musées - {{ site_name }}</title>
    
    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* ===== VARIABLES - CHARTE SOMBRE ===== */
        :root {
            --primary: #2c3e50;
            --primary-dark: #1a2634;
            --secondary: #e6d8c3;
            --background: #0f1a24;
            --surface: #1e2a36;
            --text: #e6d8c3;
            --text-light: #b8a99a;
            --gold: #d4af37;
            --gold-light: rgba(212,175,55,0.1);
            --border: rgba(230,216,195,0.15);
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 20px rgba(0,0,0,0.5);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: var(--background);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: white;
            letter-spacing: -0.02em;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1 0 auto;
            width: 100%;
        }

        /* ===== CONTAINER ===== */
        .museum-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* ===== HEADER ===== */
        .museum-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .museum-header h1 {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 1rem;
        }

        .global-stats {
            display: inline-flex;
            gap: 2rem;
            background: var(--surface);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .global-stats span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }

        .global-stats i {
            color: var(--gold);
        }

        /* ===== RECHERCHE PAYS ===== */
        .search-section {
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .search-card {
            background: var(--surface);
            border-radius: 50px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 0.8rem 0;
            background: transparent;
            color: white;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: var(--text-light);
        }

        .search-input:focus {
            outline: none;
        }

        .search-reset {
            background: var(--primary-dark);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-reset:hover {
            background: var(--gold);
            color: var(--primary-dark);
        }

        /* ===== LISTE DES PAYS ===== */
        .countries-list {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            max-height: 400px;
            overflow-y: auto;
            margin: 0.5rem 0 2rem;
            display: none;
        }

        .countries-list.visible {
            display: block;
        }

        .country-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .country-item:hover {
            background: var(--primary-dark);
        }

        .country-name {
            font-weight: 500;
            color: white;
        }

        .country-stats {
            display: flex;
            gap: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .country-stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .country-stats i {
            color: var(--gold);
        }

        /* ===== VILLES ===== */
        .cities-section {
            margin-bottom: 2rem;
            display: none;
        }

        .cities-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .selected-country-badge {
            background: var(--gold);
            color: var(--primary-dark);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reset-country {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1rem;
        }

        .reset-country:hover {
            color: var(--gold);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.8rem;
        }

        .city-card {
            background: var(--primary-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .city-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .city-card.active {
            background: var(--gold);
            border-color: var(--gold);
        }

        .city-card.active .city-name,
        .city-card.active .city-stats {
            color: var(--primary-dark);
        }

        .city-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        .city-stats {
            display: flex;
            gap: 1rem;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .city-stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .city-stats i {
            color: var(--gold);
        }

        .city-card.active .city-stats i {
            color: var(--primary-dark);
        }

        /* ===== MUSÉES ===== */
        .museums-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .museum-card {
            background: var(--primary-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .museum-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            background: var(--surface);
        }

        .museum-name {
            font-weight: 600;
            color: white;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .museum-location {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .museum-location i {
            color: var(--gold);
            font-size: 0.7rem;
        }

        .museum-works {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .museum-works i {
            color: var(--gold);
            font-size: 0.7rem;
        }

        /* ===== BOUTON VOIR PLUS ===== */
        .view-more-container {
            text-align: center;
            margin: 2rem 0;
        }

        .btn-view-more {
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 0.8rem 2.5rem;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-view-more:hover {
            background: var(--gold);
            color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
        }

        /* ===== LOADING & EMPTY STATES ===== */
        .loading, .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            grid-column: span 4;
        }

        .loading i {
            margin-right: 0.5rem;
            color: var(--gold);
        }

        /* ===== SCROLL TO TOP ===== */
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--gold);
            color: var(--primary-dark);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            box-shadow: var(--shadow-hover);
            z-index: 100;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-3px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .museums-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .loading, .empty-state {
                grid-column: span 3;
            }
        }

        @media (max-width: 992px) {
            .museums-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .loading, .empty-state {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .museum-header h1 {
                font-size: 2rem;
            }
            .global-stats {
                flex-direction: column;
                gap: 0.5rem;
                padding: 1rem;
            }
            .cities-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .museums-grid {
                grid-template-columns: 1fr;
            }
            .loading, .empty-state {
                grid-column: span 1;
            }
            .scroll-top {
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="museum-container">
            <!-- HEADER -->
            <div class="museum-header">
                <h1>Explorer les musées</h1>
                <div class="global-stats" id="global-stats">
                    <span><i class="fas fa-spinner fa-spin"></i> Chargement...</span>
                </div>
            </div>

            <!-- RECHERCHE PAYS -->
            <div class="search-section">
                <div class="search-card">
                    <input type="text" id="country-search" class="search-input" 
                           placeholder="Rechercher un pays..." autocomplete="off">
                    <button class="search-reset" id="reset-search" style="display: none;">
                        Effacer
                    </button>
                </div>
            </div>

            <!-- LISTE DES PAYS -->
            <div id="countries-list" class="countries-list"></div>

            <!-- VILLES -->
            <div id="cities-section" class="cities-section">
                <div class="cities-header">
                    <span class="selected-country-badge" id="selected-country-name">
                        <i class="fas fa-flag"></i> <span></span>
                    </span>
                    <button class="reset-country" onclick="resetCountry()" id="reset-country-btn">
                        <i class="fas fa-times-circle"></i> Retour à tous les musées
                    </button>
                </div>
                
                <div id="cities-container" class="cities-grid">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
                </div>
            </div>

            <!-- MUSÉES -->
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin: 1rem 0;">
                <h3 id="museums-title" style="margin:0;">Tous les musées</h3>
                <span class="badge" id="museums-count" style="background:var(--gold-light); color:var(--gold); padding:0.3rem 1rem; border-radius:30px;">0</span>
            </div>
            
            <div id="museums-container" class="museums-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Chargement des musées...
                </div>
            </div>
            
            <div id="view-more-container" class="view-more-container" style="display: none;">
                <button class="btn-view-more" onclick="loadMoreMuseums()">
                    Voir plus
                </button>
            </div>
        </div>
    </div>

    <!-- BOUTON SCROLL TO TOP -->
    <div class="scroll-top" id="scroll-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    {% include 'footer.html' %}

    <script>
        const currentLang = '{{ session.get("language", "fr") }}';
        let allCountries = [], allMuseums = [], filteredMuseums = [], citiesData = [];
        let currentCountry = '', currentCity = '';
        let museumsOffset = 16, museumsPerPage = 16;

        // ===== INITIALISATION =====
        document.addEventListener('DOMContentLoaded', function() {
            loadCountries();
            loadMuseums();
            initScrollToTop();
            
            document.getElementById('country-search').addEventListener('input', filterCountries);
            document.getElementById('reset-search').addEventListener('click', resetSearch);
            
            // Cacher la liste des pays quand on clique ailleurs
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-section') && !e.target.closest('.countries-list')) {
                    document.getElementById('countries-list').classList.remove('visible');
                }
            });
        });

        // ===== SCROLL TO TOP =====
        function initScrollToTop() {
            const scrollBtn = document.getElementById('scroll-top');
            window.addEventListener('scroll', () => {
                scrollBtn.classList.toggle('visible', window.scrollY > 400);
            });
            scrollBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ===== CHARGEMENT DES DONNÉES =====
        async function loadCountries() {
            try {
                const res = await fetch(`/api/museums/countries?lang=${currentLang}`);
                allCountries = await res.json();
                allCountries.sort((a, b) => a.name.localeCompare(b.name));
                displayCountries(allCountries);
            } catch (e) { 
                console.error('Erreur chargement pays:', e);
            }
        }

        async function loadMuseums() {
            try {
                const res = await fetch(`/api/museums/list?lang=${currentLang}`);
                allMuseums = await res.json();
                allMuseums.sort((a, b) => (b.oeuvres_count || 0) - (a.oeuvres_count || 0));
                filteredMuseums = [...allMuseums];
                
                const totalMuseums = allMuseums.length;
                const totalWorks = allMuseums.reduce((sum, m) => sum + (m.oeuvres_count || 0), 0);
                
                document.getElementById('global-stats').innerHTML = `
                    <span><i class="fas fa-landmark"></i> ${totalMuseums} musées</span>
                    <span><i class="fas fa-palette"></i> ${totalWorks.toLocaleString()} œuvres</span>
                `;
                
                displayMuseums(filteredMuseums.slice(0, museumsPerPage));
                updateMuseumsCount();
                
                if (filteredMuseums.length > museumsPerPage) {
                    document.getElementById('view-more-container').style.display = 'block';
                }
                
            } catch (e) { 
                console.error('Erreur chargement musées:', e);
                document.getElementById('museums-container').innerHTML = 
                    '<div class="empty-state">Erreur de chargement</div>';
            }
        }

        // ===== FILTRAGE PAYS =====
        function filterCountries() {
            const q = document.getElementById('country-search').value.toLowerCase().trim();
            document.getElementById('reset-search').style.display = q ? 'block' : 'none';
            
            const filtered = q ? allCountries.filter(c => 
                c.name.toLowerCase().includes(q)
            ) : allCountries;
            
            displayCountries(filtered);
            document.getElementById('countries-list').classList.add('visible');
        }

        function displayCountries(countries) {
            const list = document.getElementById('countries-list');
            if (!countries.length) {
                list.innerHTML = '<div class="country-item" style="justify-content:center;">Aucun pays trouvé</div>';
                return;
            }
            
            list.innerHTML = countries.map(c => `
                <div class="country-item" onclick="selectCountry('${c.name.replace(/'/g, "\\'")}')">
                    <span class="country-name">${c.name}</span>
                    <span class="country-stats">
                        <span><i class="fas fa-landmark"></i>${c.museums}</span>
                        <span><i class="fas fa-palette"></i>${c.works}</span>
                    </span>
                </div>
            `).join('');
        }

        // ===== SÉLECTION PAYS =====
        async function selectCountry(name) {
            currentCountry = name;
            currentCity = '';
            
            document.getElementById('countries-list').classList.remove('visible');
            document.getElementById('country-search').value = name;
            document.getElementById('reset-search').style.display = 'block';
            document.getElementById('selected-country-name').querySelector('span').textContent = name;
            
            await loadCities(name);
            filterMuseums();
            
            document.getElementById('cities-section').style.display = 'block';
        }

        // ===== CHARGEMENT VILLES =====
        async function loadCities(country) {
            try {
                document.getElementById('cities-container').innerHTML = 
                    '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
                
                const res = await fetch(`/api/museums/cities?country=${encodeURIComponent(country)}&lang=${currentLang}`);
                citiesData = await res.json();
                citiesData.sort((a, b) => b.museums - a.museums);
                
                displayCities(citiesData);
            } catch (e) { 
                console.error('Erreur chargement villes:', e);
                document.getElementById('cities-container').innerHTML = 
                    '<div class="empty-state">Erreur de chargement</div>';
            }
        }

        function displayCities(cities) {
            const container = document.getElementById('cities-container');
            
            if (!cities.length) {
                container.innerHTML = '<div class="empty-state">Aucune ville trouvée</div>';
                return;
            }
            
            container.innerHTML = cities.map(c => `
                <div class="city-card ${currentCity === c.name ? 'active' : ''}" 
                     onclick="selectCity('${c.name.replace(/'/g, "\\'")}')">
                    <div class="city-name">${c.name}</div>
                    <div class="city-stats">
                        <span><i class="fas fa-landmark"></i>${c.museums}</span>
                        <span><i class="fas fa-palette"></i>${c.works}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectCity(cityName) {
            currentCity = currentCity === cityName ? '' : cityName;
            
            document.querySelectorAll('.city-card').forEach(c => {
                if (c.querySelector('.city-name').textContent === cityName) {
                    c.classList.toggle('active', currentCity === cityName);
                } else {
                    c.classList.remove('active');
                }
            });
            
            filterMuseums();
        }

        function resetCountry() {
            currentCountry = '';
            currentCity = '';
            
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            document.getElementById('cities-section').style.display = 'none';
            document.getElementById('countries-list').classList.remove('visible');
            
            filteredMuseums = [...allMuseums];
            museumsOffset = 16;
            displayMuseums(filteredMuseums.slice(0, museumsPerPage));
            updateMuseumsCount();
            
            document.getElementById('museums-title').textContent = 'Tous les musées';
            
            if (filteredMuseums.length > museumsPerPage) {
                document.getElementById('view-more-container').style.display = 'block';
            }
        }

        function resetSearch() {
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            displayCountries(allCountries);
        }

        // ===== FILTRAGE MUSÉES =====
        function filterMuseums() {
            let filtered = allMuseums;
            
            if (currentCountry) {
                filtered = filtered.filter(m => m.pays === currentCountry);
            }
            if (currentCity) {
                filtered = filtered.filter(m => m.ville === currentCity);
            }
            
            filteredMuseums = filtered;
            museumsOffset = 16;
            displayMuseums(filtered.slice(0, museumsPerPage));
            updateMuseumsCount();
            
            if (currentCity) {
                document.getElementById('museums-title').textContent = `${currentCity}`;
            } else if (currentCountry) {
                document.getElementById('museums-title').textContent = `${currentCountry}`;
            } else {
                document.getElementById('museums-title').textContent = 'Tous les musées';
            }
            
            if (filtered.length > museumsPerPage) {
                document.getElementById('view-more-container').style.display = 'block';
            } else {
                document.getElementById('view-more-container').style.display = 'none';
            }
        }

        // ===== AFFICHAGE MUSÉES =====
        function displayMuseums(museums) {
            const container = document.getElementById('museums-container');
            
            if (!museums?.length) {
                container.innerHTML = '<div class="empty-state">Aucun musée trouvé</div>';
                return;
            }
            
            container.innerHTML = museums.map(m => `
                <div class="museum-card" onclick="handleMuseumClick(event, '${m.id}', '${m.nom.replace(/'/g, "\\'")}')">
                    <div class="museum-name" title="${m.nom || 'Musée'}">${m.nom || 'Musée'}</div>
                    <div class="museum-location">
                        <i class="fas fa-map-marker-alt"></i> ${m.ville || '?'}, ${m.pays || '?'}
                    </div>
                    <div class="museum-works">
                        <i class="fas fa-palette"></i> ${m.oeuvres_count || 0} œuvres
                    </div>
                </div>
            `).join('');
        }

        function loadMoreMuseums() {
            const next = filteredMuseums.slice(museumsOffset, museumsOffset + museumsPerPage);
            if (!next.length) return;
            
            const container = document.getElementById('museums-container');
            
            next.forEach(m => {
                const div = document.createElement('div');
                div.className = 'museum-card';
                div.setAttribute('onclick', `handleMuseumClick(event, '${m.id}', '${m.nom.replace(/'/g, "\\'")}')`);
                div.innerHTML = `
                    <div class="museum-name" title="${m.nom || 'Musée'}">${m.nom || 'Musée'}</div>
                    <div class="museum-location">
                        <i class="fas fa-map-marker-alt"></i> ${m.ville || '?'}, ${m.pays || '?'}
                    </div>
                    <div class="museum-works">
                        <i class="fas fa-palette"></i> ${m.oeuvres_count || 0} œuvres
                    </div>
                `;
                container.appendChild(div);
            });
            
            museumsOffset += museumsPerPage;
            
            if (museumsOffset >= filteredMuseums.length) {
                document.getElementById('view-more-container').style.display = 'none';
            }
        }

        function updateMuseumsCount() {
            document.getElementById('museums-count').textContent = filteredMuseums.length;
        }

        function handleMuseumClick(event, id, name) {
            event.preventDefault();
            const url = `/?museum=${encodeURIComponent(name)}`;
            if (event.ctrlKey || event.metaKey) window.open(url, '_blank');
            else window.location.href = url;
        }
    </script>
</body>
</html>
