<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 SURPRISE ! - {{ site_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D, #FF9F1C, #BF8FAD);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #2c3e50;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 1s ease;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        /* Particules */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
            pointer-events: none;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }
        
        /* Formes géométriques */
        .shape {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
            animation: rotate 20s infinite linear;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .shape.square {
            width: 50px;
            height: 50px;
            background: #2c3e50;
            opacity: 0.05;
        }
        
        .shape.circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e6d8c3;
            opacity: 0.1;
        }
        
        .shape.triangle {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #2c3e50;
            opacity: 0.05;
            background: transparent;
        }
        
        /* Carte principale */
        .surprise-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2.5rem 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 700px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #5d6d7e;
            margin-bottom: 2rem;
            font-style: italic;
        }
        
        /* Cadre de citation */
        .quote-frame {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 2rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(44,62,80,0.1);
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .quote {
            font-size: 1.3rem;
            font-weight: 300;
            margin: 0.5rem 0;
            font-family: 'Playfair Display', serif;
            line-height: 1.5;
            color: #2c3e50;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .quote-author {
            color: #5d6d7e;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            font-style: italic;
        }
        
        /* Boutons */
        .button-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .btn-primary {
            background: #2c3e50;
            color: #e6d8c3;
        }
        
        .btn-primary:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44,62,80,0.2);
        }
        
        .btn-random {
            background: #e6d8c3;
            color: #2c3e50;
            border-color: #e6d8c3;
        }
        
        .btn-random:hover {
            background: #d4c9b9;
            transform: translateY(-2px);
        }
        
        .secret-message {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #8e9aab;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.3rem 1rem;
            display: inline-block;
            border-radius: 30px;
            background: rgba(255,255,255,0.3);
        }
        
        .secret-message:hover {
            color: #2c3e50;
            background: rgba(255,255,255,0.8);
        }
        
        @media (max-width: 768px) {
            .surprise-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .quote {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

        let currentIndex = 0;
        const totalQuotes = quotes.length;

        // Palettes de couleurs joyeuses
        const colorPalettes = [
            ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', '#BF8FAD'],
            ['#FF8A5C', '#B83B5E', '#F9ED69', '#6A2C70', '#08D9D6'],

            ['#FF9A8B', '#FF6A88', '#FF99AC', '#FFB6C1', '#FFC3A0']

        function randomQuote() {
            currentIndex = Math.floor(Math.random() * totalQuotes);
            document.getElementById('quote').textContent = '"' + quotes[currentIndex].text + '"';
            document.getElementById('author').textContent = '— ' + quotes[currentIndex].author;
        }

        function changeBackground() {
            // Choisir une palette aléatoire
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
            
            // Créer un dégradé avec 4 couleurs de la palette
            const gradient = `linear-gradient(135deg, 
                ${palette[0]}, 
                ${palette[1]}, 
                ${palette[2]}, 
                ${palette[3]}, 
                ${palette[4]})`;
            
            document.body.style.background = gradient;
            document.body.style.backgroundSize = '400% 400%';
            
            // Effet de surprise
            const message = document.querySelector('.secret-message');
            message.style.transform = 'scale(1.1)';
            setTimeout(() => {
                message.style.transform = 'scale(1)';
            }, 200);
            
            // Ajouter des particules de couleurs
            createColorBurst();
        }

        function createColorBurst() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
                    particle.style.width = (Math.random() * 8 + 2) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.animation = 'float 3s forwards';
                    document.getElementById('particles-container').appendChild(particle);
                    
                    setTimeout(() => particle.remove(), 3000);
                }, i * 20);
            }
        }

        // Créer des particules en arrière-plan
        function createBackgroundParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
                particle.style.width = (Math.random() * 6 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.opacity = '0.3';
                container.appendChild(particle);
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            randomQuote();
            createBackgroundParticles();
        });
    </script>
