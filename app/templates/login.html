<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }} - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== STYLES GÉNÉRAUX ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f0e8;
            color: #2c3e50;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: #1e2b3a;
        }
        
        /* ===== STYLES SPÉCIFIQUES À LOGIN ===== */
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 150px);
            padding: 1rem;
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 12px rgba(44,62,80,0.05);
            width: 100%;
        }
        
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #2c3e50;
        }
        
        .form-control {
            border: 1px solid #e0d6c8;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }
        
        .form-control:focus {
            border-color: #2c3e50;
            box-shadow: 0 0 0 0.2rem rgba(44,62,80,0.1);
            outline: none;
        }
        
        /* Style pour l'œil */
        .password-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-input-group .form-control {
            padding-right: 2.5rem;
        }
        
        .password-toggle {
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            color: #5d6d7e;
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
            transition: color 0.2s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        
        .password-toggle:hover {
            color: #2c3e50;
        }
        
        .password-toggle:focus {
            outline: none;
        }
        
        .btn-login-form {
            background: #2c3e50;
            color: #e6d8c3;
            border: none;
            border-radius: 30px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            width: auto;
            min-width: 150px;
            display: block;
            margin: 1.5rem auto 0;
            transition: all 0.2s;
        }
        
        .btn-login-form:hover {
            background: #1e2b3a;
            color: #e6d8c3;
            transform: scale(1.02);
        }
        
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #5d6d7e;
            font-size: 0.9rem;
        }
        
        .register-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        /* Alertes centrées */
        .alert {
            border-radius: 8px;
            margin: 0 0 1.5rem 0;
            font-size: 0.85rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        
        .alert-dismissible .btn-close {
            padding: 0.75rem;
        }
        
        /* Supprimer les anciens styles inutilisés */
        .hero-section {
            display: none;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container login-container">
        <div class="login-card">
            <h2 class="login-title">Se connecter</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show" role="alert">
                            <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' if category == 'danger' else 'info-circle' }}"></i>
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                
                <div class="mb-3">
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="Email" required>
                </div>
                
                <div class="mb-3">
                    <div class="password-input-group">
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Mot de passe" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-login-form">Se connecter</button>
            </form>
            
            <div class="register-link">
                Pas encore de compte ? <a href="/register">S'inscrire</a>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fonction pour afficher/masquer le mot de passe
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput && toggleIcon) {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            }
        }

        // Auto-fermeture des alertes après 5 secondes
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
</body>
</html>
